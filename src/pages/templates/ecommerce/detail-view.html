{% include "ecommerce/messages.html" %}
<h1>{{ product.title }}</h1>
<h2>
    {% if product.vendedor %}
        Vendedor: {{ product.vendedor }}
    {% endif %}
</h2>

<p>Price: {{ product.price }}</p>
<p>{{ product.descripcion }}</p>
<p>Color: {{ product.color }}</p>
<p>Tamaño: {{ product.dimenciones }}</p>

<a href="/ecommerce/">Volver a la lista de productos</a>
